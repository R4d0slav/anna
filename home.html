<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rade 💖 Anna</title>
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/atmosphere.css">
    <link rel="stylesheet" href="./css/bear.css">
    <link rel="stylesheet" href="./css/ui-elements.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
        
<div class="anniversary-top" id="anniversaryTop">
    <div class="text-cloud">
        1 Month <span id="anniversaryHeart">💝</span>
    </div>
</div>

    <div class="heart-atmosphere">
        <div class="pulse-heart p1">💖</div>
        <div class="pulse-heart p2">💝</div>
        <div class="pulse-heart p3">💓</div>
        <div class="pulse-heart p4">💗</div>
        
        <div class="drift-heart">❤️</div>
        <div class="drift-heart">💕</div>
        <div class="drift-heart">💗</div>
        <div class="drift-heart">🌸</div>
        <div class="drift-heart">✨</div>
        <div class="drift-heart">❤️</div>
        <div class="drift-heart">💖</div>
        <div class="drift-heart">💕</div>
    </div>

    <div class="photo-gallery">
        <div class="photo-frame p1">
            <div class="tape"></div>
            <img src="./assets/images/image1.jpeg" alt="Us">
            <span class="photo-caption">Koper</span>
        </div>
        <div class="photo-frame p2">
            <div class="tape"></div>
            <img src="./assets/images/image2.jpeg" alt="Us">
            <span class="photo-caption">Bled</span>
        </div>
        <div class="photo-frame p3">
            <div class="tape"></div>
            <img src="./assets/images/image3.jpeg" alt="Us">
            <span class="photo-caption">Bohinj</span>
        </div>
        <div class="photo-frame p4">
            <div class="tape"></div>
            <img src="./assets/images/image4.jpeg" alt="Us">
            <span class="photo-caption">Bohinj</span>
        </div>
        <div class="photo-frame p5">
            <div class="tape"></div>
            <img src="./assets/images/image5.jpeg" alt="Us">
            <span class="photo-caption">Trieste</span>
        </div>
        <div class="photo-frame p6">
            <div class="tape"></div>
            <img src="./assets/images/image6.jpeg" alt="Us">
            <span class="photo-caption">Koper</span>
        </div>
    </div>



   <div class="bear-container">
        <div class="heart-cloud-pile back-pile">
            <img src="./assets/images/heart.png" class="heart heart-7">
            <img src="./assets/images/heart.png" class="heart heart-8">
            <img src="./assets/images/heart.png" class="heart heart-9">
            <img src="./assets/images/heart.png" class="heart heart-10">
            <img src="./assets/images/heart.png" class="heart heart-11">
            <img src="./assets/images/heart.png" class="heart heart-12">
            <img src="./assets/images/heart.png" class="heart heart-13">
            <img src="./assets/images/heart.png" class="heart heart-14">
            <img src="./assets/images/heart.png" class="heart heart-15">
            <img src="./assets/images/heart.png" class="heart heart-16">
        </div>

        <div class="bear-wrapper">
            <img src="./assets/images/bear.png" alt="Cute Bear" class="bear-image">
            <img src="./assets/images/flower.png" alt="Flower" class="flower-item">
            <img src="./assets/images/letter.png" alt="Letter" class="letter-item">
        </div>

        <div class="heart-cloud-pile front-pile">
            <img src="./assets/images/heart.png" class="heart heart-1">
            <img src="./assets/images/heart.png" class="heart heart-2">
            <img src="./assets/images/heart.png" class="heart heart-3">
            <img src="./assets/images/heart.png" class="heart heart-4">
            <img src="./assets/images/heart.png" class="heart heart-5">
            <img src="./assets/images/heart.png" class="heart heart-6">
            <img src="./assets/images/heart.png" class="heart heart-17">
            <img src="./assets/images/heart.png" class="heart heart-18">
            <img src="./assets/images/heart.png" class="heart heart-19">
        </div>
        
    </div>

    <div class="music-control" onclick="toggleMusic()">
    <span id="music-icon">🎵</span>
    <audio id="bg-music" loop>
        <source src="./assets/sounds/music.mp3" type="audio/mpeg">
    </audio>
</div>

<div id="letterModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        
        <div class="message-body">
            <div class="stamp">🎀</div>
            <h2 class="handwritten">Szia Anna! ✨</h2>
            
            <div class="text-content">
                <p>Happy one month anniversary...</p>
                <p>I love you so, so much. You make me the happiest person ever, and I'm so lucky to have you.</p>
            </div>
            
            <div class="divider">
                <span class="dot"></span><span class="heart-dot">💖</span><span class="dot"></span>
            </div>
            
            <div class="hungarian-wrap">
                <p>Teljes szívemből szeretlek!</p>
                <p class="signature">Your love, Rade</p>
            </div>
        </div>
    </div>
</div>

<!-- ========== REQUIRED BY puzzle.js (hidden but MUST exist) ========== -->

<div id="menu">
    <button id="menuToggle">🌸</button>
    <label>
        <input id="enablerot" type="checkbox"> Enable Rotation
    </label>
    <select id="shape">
        <option value="1">Shape 1</option>
        <option value="2">Shape 2</option>
        <option value="3">Shape 3</option>
        <option value="4">Shape 4</option>
    </select>
    <input id="nbpieces" type="number" value="24" min="4" max="200">
    <select id="drawmode">
        <option value="0">Emboss</option>
        <option value="1">Internal</option>
        <option value="2">Both</option>
    </select>
    <button id="start" style="display:none;">Start</button>
    <button id="stop" disabled style="display:none;">Stop</button>
    <button id="help" style="display:none;">Help</button>
    <button id="helpstorage" style="display:none;">Storage Help</button>
    <!-- Hidden elements required by engine but not needed for UI -->
    <div id="load" style="display:none;"></div>
    <div id="default" style="display:none;"></div>
</div>

<div id="controls"></div>


<!-- ========== PUZZLE MODAL ========== -->

<div id="jigsawModal">
    <div id="jigsawContent">
        <div id="closePuzzle">✕</div>
        <div id="forPuzzle"></div>
    </div>
</div>



<!-- ========== LOAD ENGINE ========== -->

<script src="./js/puzzle.js"></script>
<script src="./js/bear.js"></script>
<script src="./js/music.js"></script>
<script src="./js/photos.js"></script>
<script src="./js/atmosphere.js"></script>

</body>
</html>
