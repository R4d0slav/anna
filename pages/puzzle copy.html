<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jigsaw • shuffle & piece together</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* prevent accidental text selection while clicking */
        }

        body {
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 2rem 2.5rem;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .puzzle-wrapper {
            background: #24303b;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), 0 8px 18px rgba(0,0,0,0.5);
        }

        /* grid container – size will be set dynamically from JS */
        #puzzle-grid {
            display: grid;
            gap: 4px;            /* small gap gives "cut" feel */
            background: #1e2a32;
            padding: 8px;
            border-radius: 24px;
            box-shadow: 0 0 0 2px #10212b, 0 12px 25px black;
            margin-bottom: 1.8rem;
            transition: all 0.2s;
        }

        .piece {
            background-repeat: no-repeat;
            background-color: #3f4f5e;   /* fallback for missing parts */
            border-radius: 16px;          /* soft jigsaw-like curve */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s, box-shadow 0.1s;
            will-change: transform;
            border: 2px solid #536d82;
        }

        .piece.selected {
            filter: brightness(1.2) drop-shadow(0 0 10px #ffe484);
            transform: scale(1.02);
            border: 3px solid #ffcf6e;
            box-shadow: 0 10px 18px black;
            z-index: 10;
            position: relative;
        }

        .piece.correct-highlight {
            border-color: #a3d8a3;
            box-shadow: 0 0 0 3px #7ed17e;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 1.2rem;
            align-items: center;
            margin-top: 1rem;
        }

        button, .file-label {
            background: #e6eef9;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: #1e2b36;
            cursor: pointer;
            box-shadow: 0 6px 0 #8f9eac, 0 6px 12px black;
            transition: 0.07s linear;
            border: 1px solid #ffffff80;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:active, .file-label:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #8f9eac, 0 6px 12px black;
        }

        button:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #8f9eac, 0 6px 12px black;
            pointer-events: none;
        }

        .file-label {
            background: #ffe5b4;
            box-shadow: 0 6px 0 #c49b6b;
        }

        #file-input {
            display: none;
        }

        .dimension-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #334754;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            box-shadow: inset 0 2px 6px #10161c;
        }

        .dimension-control select {
            background: #f0f4fa;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .win-message {
            text-align: center;
            background: #a9d6b0;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1d4427;
            box-shadow: 0 3px 0 #4f7a5a;
            transition: 0.2s;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            color: #cfdeed;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="puzzle-wrapper">
        <div id="puzzle-grid"></div>

        <div class="toolbar">
            <label for="file-input" class="file-label">📁 upload image</label>
            <input type="file" id="file-input" accept="image/*">

            <div class="dimension-control">
                <span>🧩 grid</span>
                <select id="grid-size">
                    <option value="2">2x2</option>
                    <option value="3" selected>3x3</option>
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                </select>
            </div>

            <button id="shuffle-btn">🔀 shuffle</button>
            <button id="reset-btn">⟲ reset</button>
        </div>

        <div class="footer">
            <span id="win-badge" class="win-message" style="background: #3e5668; color:#cee5ff; box-shadow: none;">✨ assemble pieces</span>
            <span style="font-size:0.95rem">click two pieces to swap</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM elements ----------
        const gridContainer = document.getElementById('puzzle-grid');
        const fileInput = document.getElementById('file-input');
        const gridSizeSelect = document.getElementById('grid-size');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const resetBtn = document.getElementById('reset-btn');
        const winBadge = document.getElementById('win-badge');

        // ---------- state ----------
        let currentImage = null;            // HTMLImageElement
        let gridN = 3;                      // default 3x3
        let pieceElements = [];              // array of HTMLElement (div) in original fragment order (not dom order)
        let selectedIndex = -1;              // index in current DOM children (for swapping)
        let originalIndices = [];             // to reset order

        // ---------- helper: generate default gradient image (rainy day fallback) ----------
        function createDefaultImage() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 600;
                canvas.height = 480;
                const ctx = canvas.getContext('2d');

                // colorful geometric pattern (looks nice as puzzle)
                ctx.fillStyle = '#30556b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // draw some shapes to make it interesting
                ctx.strokeStyle = '#ffcf8e';
                ctx.lineWidth = 20;
                ctx.strokeRect(30, 30, canvas.width-60, canvas.height-60);

                ctx.fillStyle = '#efc7a2';
                ctx.beginPath();
                ctx.arc(200, 150, 80, 0, 2*Math.PI);
                ctx.fill();

                ctx.fillStyle = '#b3d0d9';
                ctx.beginPath();
                ctx.arc(420, 300, 100, 0, 2*Math.PI);
                ctx.fill();

                ctx.fillStyle = '#cf9f6e';
                ctx.font = 'bold 60px "Segoe UI", cursive';
                ctx.fillText('🧩', 230, 350);

                const img = new Image();
                img.onload = () => resolve(img);
                img.src = canvas.toDataURL('image/png');
            });
        }

        // ---------- build puzzle pieces from image, destroy old ones ----------
        async function buildPuzzleFromImage(img) {
            currentImage = img;

            // 1. determine container size based on image aspect ratio (max width 600px)
            const maxW = 600;
            let containerW, containerH;
            if (img.width > img.height) {
                containerW = maxW;
                containerH = (img.height / img.width) * maxW;
            } else {
                containerH = maxW;
                containerW = (img.width / img.height) * maxW;
            }
            // keep a bit of margin, ensure integer pixels for piece edges (rounding)
            containerW = Math.floor(containerW);
            containerH = Math.floor(containerH);

            // 2. set grid container size and grid template
            gridContainer.style.width = containerW + 'px';
            gridContainer.style.height = containerH + 'px';
            gridContainer.style.gridTemplateColumns = `repeat(${gridN}, 1fr)`;
            gridContainer.style.gridTemplateRows = `repeat(${gridN}, 1fr)`;

            // 3. piece dimensions
            const pieceW = containerW / gridN;
            const pieceH = containerH / gridN;

            // 4. clear container
            gridContainer.innerHTML = '';
            pieceElements = [];

            // 5. create N*N pieces with correct background
            for (let row = 0; row < gridN; row++) {
                for (let col = 0; col < gridN; col++) {
                    const piece = document.createElement('div');
                    piece.className = 'piece';
                    // store intended position (which image fragment it shows)
                    piece.dataset.row = row;
                    piece.dataset.col = col;
                    piece.dataset.index = row * gridN + col;   // 0..N*N-1

                    // set background: full image scaled to container size, then shifted
                    piece.style.backgroundImage = `url('${img.src}')`;
                    piece.style.backgroundSize = `${containerW}px ${containerH}px`;
                    // background-position: left offset = - col*pieceW , top offset = - row*pieceH
                    piece.style.backgroundPosition = `-${col * pieceW}px -${row * pieceH}px`;

                    // store in array (ordered by original position)
                    pieceElements.push(piece);
                }
            }

            // 6. initial order = shuffled
            shufflePiecesInPlace();

            // 7. attach click listeners (delegation from container)
            selectedIndex = -1;
            updateWinStatus();
        }

        // ---------- shuffle the DOM children randomly ----------
        function shufflePiecesInPlace() {
            // create array of current children
            const children = Array.from(gridContainer.children);
            // fisher-yates shuffle
            for (let i = children.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [children[i], children[j]] = [children[j], children[i]];
            }
            // re-attach in shuffled order
            gridContainer.innerHTML = '';
            children.forEach(child => gridContainer.appendChild(child));
            selectedIndex = -1;           // clear selection
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected', 'correct-highlight'));
        }

        // ---------- reset to correct (solved) order ----------
        function resetToSolved() {
            // remove all pieces
            gridContainer.innerHTML = '';
            // append in original index order (0..N*N-1)
            const sorted = [...pieceElements].sort((a, b) => {
                return (parseInt(a.dataset.index) - parseInt(b.dataset.index));
            });
            sorted.forEach(p => gridContainer.appendChild(p));
            selectedIndex = -1;
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected', 'correct-highlight'));
            updateWinStatus();
        }

        // ---------- check if puzzle is solved ----------
        function isPuzzleSolved() {
            const pieces = gridContainer.children;
            for (let i = 0; i < pieces.length; i++) {
                const piece = pieces[i];
                const currentRow = Math.floor(i / gridN);
                const currentCol = i % gridN;
                const expectedRow = parseInt(piece.dataset.row);
                const expectedCol = parseInt(piece.dataset.col);
                if (currentRow !== expectedRow || currentCol !== expectedCol) {
                    return false;
                }
            }
            return true;
        }

        // ---------- update win message and style ----------
        function updateWinStatus() {
            if (isPuzzleSolved()) {
                winBadge.textContent = '✨ PUZZLE COMPLETE! ✨';
                winBadge.style.background = '#b7e3b0';
                winBadge.style.color = '#1d542d';
                winBadge.style.boxShadow = '0 3px 0 #5d9e6b';
            } else {
                winBadge.textContent = '🧩 keep going...';
                winBadge.style.background = '#3e5668';
                winBadge.style.color = '#cee5ff';
                winBadge.style.boxShadow = 'none';
            }
        }

        // ---------- swap two pieces in the DOM (by indices in children) ----------
        function swapPieces(indexA, indexB) {
            if (indexA === indexB) return;
            const parent = gridContainer;
            const children = parent.children;
            if (indexA < 0 || indexB < 0 || indexA >= children.length || indexB >= children.length) return;

            // swap DOM nodes
            if (indexA > indexB) [indexA, indexB] = [indexB, indexA]; // make sure indexA < indexB
            const nodeA = children[indexA];
            const nodeB = children[indexB];

            // insert nodeB right before nodeA, then nodeA right before the next sibling of nodeB? simpler: replace with clone trick? 
            // But we can use insertBefore properly:
            if (indexA + 1 === indexB) {
                // adjacent: insert nodeB before nodeA, then nodeA after nodeB? Actually easier: remove and insert
                parent.insertBefore(nodeB, nodeA); // moves nodeB before nodeA
                // now nodeA is after nodeB, we want nodeA to be at indexB (original nodeB position) – but we swapped.
                // after first line, order: nodeB, nodeA, rest... we need nodeA at indexB position? The desired is that nodeA goes to indexB and nodeB to indexA.
                // Actually: if we put nodeB before nodeA, then nodeB is at indexA and nodeA at indexA+1. That's already swapped correctly? Example: [A,B] -> put B before A => [B,A] correct.
                // So for adjacent, just insertBefore(nodeB, nodeA) works.
            } else {
                // non-adjacent: more complex but insertBefore twice
                const nodeANext = nodeA.nextSibling;
                const nodeBNext = nodeB.nextSibling;
                // Move nodeB before nodeA
                parent.insertBefore(nodeB, nodeA);
                // Move nodeA to where nodeB used to be (before nodeBNext)
                parent.insertBefore(nodeA, nodeBNext);
            }

            // clear selected classes
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected', 'correct-highlight'));
            selectedIndex = -1;
            updateWinStatus();
        }

        // ---------- click handler (event delegation) ----------
        function onGridClick(e) {
            const piece = e.target.closest('.piece');
            if (!piece) return;

            const children = Array.from(gridContainer.children);
            const currentIdx = children.indexOf(piece);

            // if no piece selected
            if (selectedIndex === -1) {
                // select this piece
                children.forEach(p => p.classList.remove('selected'));
                piece.classList.add('selected');
                selectedIndex = currentIdx;
                return;
            }

            // a piece is already selected
            if (selectedIndex === currentIdx) {
                // deselect same piece
                piece.classList.remove('selected');
                selectedIndex = -1;
                return;
            }

            // swap the selected piece with the clicked piece
            swapPieces(selectedIndex, currentIdx);
        }

        // ---------- initialize with default image on page load ----------
        async function initDefault() {
            const defaultImg = await createDefaultImage();
            gridN = parseInt(gridSizeSelect.value);
            await buildPuzzleFromImage(defaultImg);
        }

        // ---------- handle file upload ----------
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    gridN = parseInt(gridSizeSelect.value);
                    buildPuzzleFromImage(img);
                    fileInput.value = ''; // allow re-upload same file
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ---------- grid size change ----------
        gridSizeSelect.addEventListener('change', () => {
            if (currentImage) {
                gridN = parseInt(gridSizeSelect.value);
                buildPuzzleFromImage(currentImage);
            } else {
                // fallback: default
                gridN = parseInt(gridSizeSelect.value);
                initDefault();
            }
        });

        // ---------- shuffle button ----------
        shuffleBtn.addEventListener('click', () => {
            if (!currentImage) return;
            shufflePiecesInPlace();
            updateWinStatus();
        });

        // ---------- reset button ----------
        resetBtn.addEventListener('click', () => {
            if (!currentImage) return;
            resetToSolved();
        });

        // ---------- attach click listener to grid ----------
        gridContainer.addEventListener('click', onGridClick);

        // ---------- start ----------
        initDefault();

        // (Optional) keyboard or escape selection if needed: click outside? simple.
        document.addEventListener('click', function outsideClick(e) {
            if (!e.target.closest('.piece')) {
                // deselect all pieces if click outside
                document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
                selectedIndex = -1;
            }
        });
    })();
</script>
</body>
</html>
