<script>
const modal = document.getElementById("letterModal");
const letter = document.querySelector(".letter-item");
const closeBtn = document.querySelector(".close-btn");

// Open: Add the 'show-in' class
letter.onclick = function() {
    modal.style.display = "block";
    modal.classList.remove("show-out");
    modal.classList.add("show-in");
}

// Close: Add the 'show-out' class, then wait for animation to finish
function closeModal() {
    modal.classList.remove("show-in");
    modal.classList.add("show-out");
    
    // Wait for the 0.4s animation to finish before hiding the div
    setTimeout(() => {
        modal.style.display = "none";
    }, 400); 
}

closeBtn.onclick = closeModal;

window.onclick = function(event) {
    if (event.target == modal) {
        closeModal();
    }
}



document.addEventListener('DOMContentLoaded', () => {
    const flower = document.querySelector('.flower-item');

    flower.addEventListener('click', (e) => {
        // Number of petals to create
        const petalCount = 18;
        const petalEmojis = ['🌸', '💮', '🌺', '✨'];

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // Pick a random petal type
            petal.innerHTML = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
            
            // Start at the click position
            const startX = e.clientX;
            const startY = e.clientY;
            
            petal.style.left = startX + 'px';
            petal.style.top = startY + 'px';
            petal.style.fontSize = (Math.random() * 15 + 15) + 'px';
            
            document.body.appendChild(petal);

            // Randomize direction and distance
            const destinationX = (Math.random() - 0.5) * 400; // Spread left/right
            const destinationY = Math.random() * 400 + 200;  // Fall down
            const rotation = Math.random() * 720 - 360;      // Spin

            // The actual animation
            const animation = petal.animate([
                { 
                    transform: 'translate(0, 0) rotate(0deg)', 
                    opacity: 1 
                },
                { 
                    transform: `translate(${destinationX}px, ${destinationY}px) rotate(${rotation}deg)`, 
                    opacity: 0 
                }
            ], {
                duration: 2000 + Math.random() * 1000,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                fill: 'forwards'
            });

            // Clean up the petal after it fades out
            animation.onfinish = () => petal.remove();
        }
    });
});


function toggleMusic() {
    const audio = document.getElementById('bg-music');
    const btn = document.querySelector('.music-control');
    const icon = document.getElementById('music-icon');

    if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        icon.innerHTML = '🎶'; // "Active" icon
    } else {
        audio.pause();
        btn.classList.remove('playing');
        icon.innerHTML = '🎵'; // "Paused" icon
    }
}






// =======================
// PUZZLE GAME
// =======================

const puzzleModal = document.getElementById("puzzleModal");
const puzzleBoard = document.getElementById("puzzle-board");
const closePuzzle = document.querySelector(".close-puzzle");

let tiles = [];
let emptyIndex = 8;
let currentImage = "";

// Make photos clickable
document.querySelectorAll(".photo-frame img").forEach(img => {
    img.addEventListener("click", () => {
        currentImage = img.src;
        startPuzzle();
    });
});

function startPuzzle() {
    puzzleModal.style.display = "block";
    createTiles();
    shuffleTiles();
    renderPuzzle();
}

closePuzzle.onclick = () => puzzleModal.style.display = "none";
window.addEventListener("click", e => {
    if (e.target === puzzleModal) puzzleModal.style.display = "none";
});

function createTiles() {
    tiles = [];
    puzzleBoard.innerHTML = "";

    for (let i = 0; i < 9; i++) {
        tiles.push(i);
    }

    emptyIndex = 8;
}

function shuffleTiles() {
    for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * i);
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
}

function renderPuzzle() {
    puzzleBoard.innerHTML = "";

    tiles.forEach((tile, index) => {
        const div = document.createElement("div");
        div.classList.add("puzzle-tile");

        if (tile === 8) {
            div.classList.add("empty");
            emptyIndex = index;
        } else {
            const x = (tile % 3) * -100;
            const y = Math.floor(tile / 3) * -100;

            div.style.backgroundImage = `url(${currentImage})`;
            div.style.backgroundPosition = `${x}px ${y}px`;
        }

        div.addEventListener("click", () => moveTile(index));
        puzzleBoard.appendChild(div);
    });
}

function moveTile(index) {
    const validMoves = [
        emptyIndex - 1,
        emptyIndex + 1,
        emptyIndex - 3,
        emptyIndex + 3
    ];

    if (validMoves.includes(index)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        renderPuzzle();
        checkWin();
    }
}

function checkWin() {
    if (tiles.every((tile, index) => tile === index)) {
        setTimeout(() => {
            alert("You solved it! 💖");
        }, 200);
    }
}
</script>
